<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="vinylGrad" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Outer vinyl disk -->
  <circle cx="50" cy="50" r="48" fill="url(#vinylGrad)" stroke="#0a0a0a" stroke-width="1"/>
  
  <!-- Grooves -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#0d0d0d" stroke-width="0.5" opacity="0.6"/>
  <circle cx="50" cy="50" r="38" fill="none" stroke="#0d0d0d" stroke-width="0.5" opacity="0.6"/>
  <circle cx="50" cy="50" r="34" fill="none" stroke="#0d0d0d" stroke-width="0.5" opacity="0.6"/>
  <circle cx="50" cy="50" r="30" fill="none" stroke="#0d0d0d" stroke-width="0.5" opacity="0.6"/>
  <circle cx="50" cy="50" r="26" fill="none" stroke="#0d0d0d" stroke-width="0.5" opacity="0.6"/>
  
  <!-- Label area -->
  <circle cx="50" cy="50" r="20" fill="#ff0844" opacity="0.85"/>
  
  <!-- Center hole -->
  <circle cx="50" cy="50" r="6" fill="#0a0a0a" stroke="#000" stroke-width="0.5"/>
  
  <!-- Shine effect -->
  <path d="M 30 30 Q 50 40, 70 30" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
</svg>
