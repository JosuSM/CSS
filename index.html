<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Records</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar__container">
            <a href="/" id="navbar__logo"><i class="fas fa-record-vinyl"></i>Retro Records</a>
            
            <div class="navbar__toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            
            <ul class="navbar__menu">
                <li class="navbar__item"><a href="/" class="navbar__links">Home</a></li>
                <li class="navbar__item"><a href="/" class="navbar__links">Services</a></li>
                <li class="navbar__item"><a href="/" class="navbar__links">Products</a></li>
                <li class="navbar__btn"><a href="#emulators" class="button">Emulators</a></li>
            </ul>
        </div>
    </nav>

    <div class="main">
        <div class="main__container">
            <div class="main__content">
                <h1>Traveling Through Time</h1>
                <p>Nostalgia is here</p>
                <button class="main__btn"><a href="#emulators">Get Started</a></button>
            </div>
            <div class="main__im--container">
                <img src="Vinyl.gif" alt="Vinyl record spinning on a turntable, evoking a nostalgic and retro atmosphere" id="main__img">
            </div>
        </div>
    </div>

    <section id="emulators" class="emulators">
        <div class="emulators__container">
            <h2>Full Emulator List</h2>
            <p>Choose a system and load your own legal ROM dump. No ROM files are hosted in this project.</p>
            <div class="emu-filters" role="tablist" aria-label="Emulator filters">
                <button class="emu-filter is-active" type="button" data-filter="all" aria-pressed="true">All</button>
                <button class="emu-filter" type="button" data-filter="mobile" aria-pressed="false">Mobile Ready</button>
                <button class="emu-filter" type="button" data-filter="stable" aria-pressed="false">Stable</button>
            </div>
            <p id="emu-count" class="emu-count" aria-live="polite">Showing 0 emulators</p>
            <div id="emu-list" class="emu-grid" aria-live="polite"></div>
        </div>
    </section>

    <footer id="footer">
        <p>Built with <i class="fas fa-heart"></i> for the Web</p>
        <div style="margin-top: 10px;">
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-linkedin"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fab fa-discord"></i></a>
            <a href="#"><i class="fab fa-reddit"></i></a>
        </div>
    </footer>

    <script type="module" src="./app.js"></script>
</body>
</html>
