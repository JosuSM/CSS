<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=launcher.html">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Zen Dots", sans-serif;
            background: radial-gradient(circle at top, #1b283e 0%, #0e1524 55%, #06090f 100%);
            color: #eef3ff;
            padding: 24px;
            text-align: center;
        }

        a {
            color: #9fc2ff;
        }
    </style>
</head>
<body>
    <main>
        <p>Redirecting to the updated emulator launcher...</p>
        <p><a id="launcher-link" href="launcher.html">Continue manually</a></p>
    </main>
    <script>
        const target = new URL('launcher.html', window.location.href);
        target.search = window.location.search;
        target.hash = window.location.hash;

        const link = document.getElementById('launcher-link');
        if (link) {
            link.href = target.toString();
        }

        window.location.replace(target.toString());
    </script>
</body>
</html>
